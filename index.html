<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevRev — Protected Content</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F5F5F5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #161616;
        }
        .login-container {
            background: #FFFFFF;
            border: 1px solid #E8E8E8;
            border-radius: 0;
            padding: 56px 48px;
            width: 90%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .logo { margin-bottom: 36px; }
        .logo svg { height: 28px; fill: #161616; }
        h1 { font-size: 22px; font-weight: 700; color: #161616; margin-bottom: 8px; letter-spacing: -0.02em; }
        .subtitle { font-size: 14px; color: #6B6B6B; margin-bottom: 36px; line-height: 1.5; }
        .input-group { position: relative; margin-bottom: 16px; }
        .input-group input { width: 100%; padding: 14px 18px; padding-right: 48px; border: 1px solid #D4D4D4; border-radius: 0; font-size: 15px; font-family: 'Inter', sans-serif; color: #161616; background: #FAFAFA; transition: border-color 0.2s ease, box-shadow 0.2s ease; }
        .input-group input::placeholder { color: #9E9E9E; }
        .input-group input:focus { outline: none; border-color: #161616; box-shadow: 0 0 0 3px rgba(22, 22, 22, 0.05); background: #FFFFFF; }
        .input-group input.error { border-color: #F35106; box-shadow: 0 0 0 3px rgba(243, 81, 6, 0.08); animation: shake 0.4s ease; }
        .toggle-password { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 16px; color: #9E9E9E; padding: 4px; }
        .toggle-password:hover { color: #6B6B6B; }
        .error-msg { color: #F35106; font-size: 13px; margin-bottom: 16px; display: none; font-weight: 500; }
        .error-msg.visible { display: block; }
        .btn-unlock { width: 100%; padding: 14px; background: #FFE600; color: #161616; border: none; border-radius: 0; font-size: 15px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; transition: background 0.15s ease, transform 0.1s ease; }
        .btn-unlock:hover { background: #F5DF00; transform: scale(1.01); }
        .btn-unlock:active { transform: scale(0.99); }
        .btn-unlock:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .footer-note { margin-top: 28px; font-size: 11px; color: #9E9E9E; letter-spacing: 0.02em; }
    </style>

        function base64ToBuffer(b64) { const bin = atob(b64); const buf = new Uint8Array(bin.length); for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i); return buf; }
        async function deriveKey(password, salt) { const enc = new TextEncoder(); const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']); return crypto.subtle.deriveKey({ name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']); }
        async function decrypt(password) { try { const payload = JSON.parse(ENCRYPTED_PAYLOAD); const salt = base64ToBuffer(payload.salt); const iv = base64ToBuffer(payload.iv); const authTag = base64ToBuffer(payload.authTag); const data = base64ToBuffer(payload.data); const combined = new Uint8Array(data.length + authTag.length); combined.set(data); combined.set(authTag, data.length); const key = await deriveKey(password, salt); const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, combined); return new TextDecoder().decode(decrypted); } catch (e) { return null; } }
        function toggleVisibility() { const input = document.getElementById('password-input'); const btn = document.querySelector('.toggle-password'); if (input.type === 'password') { input.type = 'text'; btn.innerHTML = '&#x1f648;'; } else { input.type = 'password'; btn.innerHTML = '&#x1f441;'; } }
        document.getElementById('unlock-form').addEventListener('submit', async function(e) { e.preventDefault(); const password = document.getElementById('password-input').value; const btn = document.getElementById('unlock-btn'); const errorMsg = document.getElementById('error-msg'); const input = document.getElementById('password-input'); btn.disabled = true; btn.textContent = 'Decrypting...'; errorMsg.classList.remove('visible'); input.classList.remove('error'); await new Promise(r => setTimeout(r, 300)); const result = await decrypt(password); if (result) { document.open(); document.write(result); document.close(); } else { btn.disabled = false; btn.textContent = 'Unlock'; errorMsg.classList.add('visible'); input.classList.add('error'); input.focus(); input.select(); } });
        document.getElementById('password-input').focus();
